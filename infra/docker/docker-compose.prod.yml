version: "3.9"

services:
  web:
    image: ghcr.io/seu-org/equipe-jiu-web:latest
    restart: unless-stopped
    env_file:
      - ../../.env
    expose:
      - "3000"

  api:
    image: ghcr.io/seu-org/equipe-jiu-api:latest
    restart: unless-stopped
    env_file:
      - ../../.env
    expose:
      - "3001"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - equipe_jiu_pgdata_prod:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf.example:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - api

volumes:
  equipe_jiu_pgdata_prod:
