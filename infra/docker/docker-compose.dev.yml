services:
  web:
    image: node:20
    working_dir: /app
    command: sh -c "if [ ! -x node_modules/.bin/next ]; then npm install --include=dev; fi && npm run build && npm run start -- --hostname 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ../../apps/web:/app
      - equipe_jiu_web_node_modules:/app/node_modules

  api:
    image: node:20
    working_dir: /app
    command: sh -c "echo 'scaffold api' && sleep infinity"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/equipe_jiu
    volumes:
      - ../../apps/api:/app
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=equipe_jiu
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - equipe_jiu_pgdata_dev:/var/lib/postgresql/data

volumes:
  equipe_jiu_pgdata_dev:
  equipe_jiu_web_node_modules:
