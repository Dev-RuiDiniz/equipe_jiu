version: "3.9"

services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'scaffold web' && sleep infinity"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ../../apps/web:/app

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'scaffold api' && sleep infinity"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/equipe_jiu
    volumes:
      - ../../apps/api:/app
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=equipe_jiu
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - equipe_jiu_pgdata_dev:/var/lib/postgresql/data

volumes:
  equipe_jiu_pgdata_dev:
